<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Advisor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a1a;
  --bg-card: #242424;
  --bg-input: #2a2a2a;
  --bg-hover: #333;
  --text: #e8e4df;
  --text-muted: #999;
  --accent: #c4a265;
  --accent-dim: rgba(196, 162, 101, 0.15);
  --border: #333;
  --radius: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

html, body { height: 100%; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ── Header ─────────────────────────────────────────── */
header {
  padding: 20px 24px 0;
  text-align: center;
  flex-shrink: 0;
}

header h1 {
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--accent);
  margin-bottom: 4px;
}

/* ── Main panel ────────────────────────────────────── */
.main-panel {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px;
}

/* ── Animations ────────────────────────────────────── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

input {
  flex: 1;
  padding: 12px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.9rem;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.2s;
}

input:focus { border-color: var(--accent); }
input::placeholder { color: var(--text-muted); }

.reset-btn {
  padding: 10px 28px;
  border-radius: 24px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 0.88rem;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s;
}

.reset-btn:hover { color: var(--accent); border-color: var(--accent); }

/* ════════════════════════════════════════════════════════
   SHOP (Vibe-based discovery)
   ════════════════════════════════════════════════════════ */

/* State: input */
.shop-input-zone {
  width: 100%;
  max-width: 600px;
  margin: auto;
  text-align: center;
}

.shop-input-zone h2 {
  font-size: 1.4rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 8px;
}

.shop-input-zone .shop-subtitle {
  font-size: 0.88rem;
  color: var(--text-muted);
  margin-bottom: 28px;
  line-height: 1.5;
}

.vibe-input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

.vibe-input-row input {
  flex: 1;
  padding: 14px 20px;
  font-size: 1rem;
  border-radius: 28px;
  background: var(--bg-card);
  border: 1px solid var(--border);
}

.vibe-input-row input:focus { border-color: var(--accent); }

.vibe-input-row button {
  padding: 14px 28px;
  border-radius: 28px;
  background: var(--accent);
  color: #1a1a1a;
  border: none;
  font-size: 0.95rem;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: opacity 0.2s;
  white-space: nowrap;
}

.vibe-input-row button:hover { opacity: 0.85; }
.vibe-input-row button:disabled { opacity: 0.4; cursor: not-allowed; }

.vibe-examples {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.vibe-chip {
  padding: 7px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-muted);
  font-size: 0.82rem;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.2s;
}

.vibe-chip:hover { color: var(--accent); border-color: var(--accent); }

/* State: loading */
.shop-loading {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  margin: auto;
  padding-top: 40px;
}

.shop-loading.active { display: flex; }
.shop-loading .loading-text {
  font-size: 0.95rem;
  color: var(--text-muted);
  margin-top: 8px;
}

/* ── Dressing stick figure animation ──────────────── */
.dressing-figure {
  width: 120px;
  height: 180px;
}

.dressing-figure .body-parts { stroke: var(--text-muted); stroke-width: 2; stroke-linecap: round; fill: none; }
.dressing-figure .clothing { stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; fill: none; opacity: 0; }

@keyframes clothFade {
  0%, 15% { opacity: 0; }
  25%, 100% { opacity: 1; }
}

.dressing-figure .pants   { animation: clothFade 6s ease infinite; }
.dressing-figure .shirt   { animation: clothFade 6s ease 1s infinite; }
.dressing-figure .shoes   { animation: clothFade 6s ease 2s infinite; }
.dressing-figure .jacket  { animation: clothFade 6s ease 3s infinite; }
.dressing-figure .hat     { animation: clothFade 6s ease 4s infinite; }

/* State: results */
.shop-results {
  display: none;
  width: 100%;
  max-width: 860px;
  flex-direction: column;
  gap: 20px;
  padding-bottom: 24px;
}

.shop-results.active { display: flex; }

.shop-results-header {
  text-align: center;
  padding: 8px 0 4px;
}

.shop-results-header .vibe-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

.shop-results-header .vibe-text {
  font-size: 1.15rem;
  color: var(--accent);
  font-weight: 500;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.product-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: all 0.2s;
  animation: fadeIn 0.4s ease;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  position: relative;
}

.product-card:hover { border-color: var(--accent); transform: translateY(-2px); }

.product-card .product-image {
  width: 100%;
  height: 220px;
  object-fit: cover;
  background: var(--bg-input);
  display: block;
}

.product-card .product-info {
  padding: 14px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}

.product-card .product-name {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.product-card .product-price {
  font-size: 0.92rem;
  color: var(--accent);
  font-weight: 600;
}

/* ── Heart / Skip actions ─────────────────────────── */
.card-actions {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 0 16px 14px;
}

.card-actions button {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
}

.card-actions .skip-btn { color: var(--text-muted); }
.card-actions .skip-btn:hover { color: #e85d5d; border-color: #e85d5d; background: rgba(232, 93, 93, 0.1); }

.card-actions .save-btn { color: var(--text-muted); }
.card-actions .save-btn:hover { color: #e85d75; border-color: #e85d75; background: rgba(232, 93, 117, 0.1); }
.card-actions .save-btn.saved { color: #e85d75; border-color: #e85d75; background: rgba(232, 93, 117, 0.15); }

.product-card.refreshing .product-info,
.product-card.refreshing .product-image,
.product-card.refreshing .card-actions { opacity: 0.3; pointer-events: none; }

.shop-reset-row {
  text-align: center;
  padding-top: 8px;
}

/* ── Hidden ─────────────────────────────────────────── */
.hidden { display: none !important; }

/* ── Mobile ─────────────────────────────────────────── */
@media (max-width: 600px) {
  header { padding: 16px 16px 0; }
  header h1 { font-size: 1.25rem; }
  .main-panel { padding: 16px; }
  .vibe-input-row { flex-direction: column; }
  .vibe-input-row button { width: 100%; }
  .product-grid { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 400px) {
  .product-grid { grid-template-columns: 1fr; }
}

/* ── Onboarding Overlay ────────────────────────────── */
.onboarding-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.3s;
}
.onboarding-overlay.hidden { display: none; }
.onboarding-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 32px;
  max-width: 420px;
  width: 90%;
  text-align: center;
}
.onboarding-card h2 {
  color: var(--accent);
  font-size: 1.3rem;
  margin-bottom: 6px;
}
.onboarding-card .subtitle {
  color: var(--text-muted);
  font-size: 0.85rem;
  margin-bottom: 24px;
}
.onboarding-field {
  margin-bottom: 20px;
  text-align: left;
}
.onboarding-field label {
  display: block;
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.onboarding-field select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg-input);
  color: var(--text);
  font-size: 0.95rem;
  font-family: var(--font);
  appearance: none;
  cursor: pointer;
}
.pill-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.pill-group .pill {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 0.85rem;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s;
}
.pill-group .pill:hover { background: var(--bg-hover); color: var(--text); }
.pill-group .pill.selected {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: var(--accent);
}
.onboarding-submit {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: var(--accent);
  color: #1a1a1a;
  font-size: 1rem;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.2s;
}
.onboarding-submit:hover { opacity: 0.9; }
.onboarding-skip {
  display: inline-block;
  margin-top: 14px;
  color: var(--text-muted);
  font-size: 0.8rem;
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font);
  text-decoration: underline;
}
.onboarding-skip:hover { color: var(--text); }

/* ── Edit Profile button ───────────────────────────── */
.edit-profile-btn {
  position: absolute;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-muted);
  font-size: 0.75rem;
  padding: 5px 10px;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.2s;
}
.edit-profile-btn:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<!-- Onboarding overlay -->
<div class="onboarding-overlay" id="onboarding">
  <div class="onboarding-card">
    <h2>Welcome</h2>
    <p class="subtitle">Tell us a bit about yourself so we can personalize your experience.</p>

    <div class="onboarding-field">
      <label>Height</label>
      <select id="ob-height">
        <option value="">Select...</option>
        <option value="5'4&quot; or under">5'4" or under</option>
        <option value="5'5&quot;&ndash;5'8&quot;">5'5"&ndash;5'8"</option>
        <option value="5'9&quot;&ndash;6'0&quot;">5'9"&ndash;6'0"</option>
        <option value="6'1&quot;+">6'1"+</option>
      </select>
    </div>

    <div class="onboarding-field">
      <label>Build</label>
      <div class="pill-group" id="ob-build">
        <button class="pill" data-val="slim">Slim</button>
        <button class="pill" data-val="average">Average</button>
        <button class="pill" data-val="athletic">Athletic</button>
        <button class="pill" data-val="stocky">Stocky</button>
      </div>
    </div>

    <div class="onboarding-field">
      <label>Budget per item</label>
      <div class="pill-group" id="ob-budget">
        <button class="pill" data-val="budget">Balling on a Budget</button>
        <button class="pill" data-val="moderate">I Like Nice Things</button>
        <button class="pill" data-val="luxury">Money Is No Object</button>
      </div>
    </div>

    <button class="onboarding-submit" id="ob-save">Get Started</button>
    <button class="onboarding-skip" id="ob-skip">Skip for now</button>
  </div>
</div>

<header style="position: relative;">
  <h1>FASHION ADVISOR</h1>
  <button class="edit-profile-btn" id="edit-profile">Edit Profile</button>
</header>

<div class="main-panel">
  <!-- Input state -->
  <div class="shop-input-zone" id="shop-input-zone">
    <h2>Describe the vibe</h2>
    <div class="shop-subtitle">Tell us the occasion or aesthetic and we'll curate the outfit.</div>
    <div class="vibe-input-row">
      <input type="text" id="vibe-input" placeholder="Ranch wedding in Texas...">
      <button id="vibe-send">Find Looks</button>
    </div>
    <div class="vibe-examples">
      <button class="vibe-chip" data-v="Smart casual Friday in NYC">Smart casual Friday</button>
      <button class="vibe-chip" data-v="Beach wedding in Positano">Beach wedding</button>
      <button class="vibe-chip" data-v="First date at a cocktail bar">Cocktail bar date</button>
      <button class="vibe-chip" data-v="Old money country club weekend">Country club weekend</button>
    </div>
  </div>

  <!-- Loading state -->
  <div class="shop-loading" id="shop-loading">
    <svg class="dressing-figure" viewBox="0 0 120 180">
      <!-- Stick figure body -->
      <g class="body-parts">
        <circle cx="60" cy="22" r="12"/><!-- head -->
        <line x1="60" y1="34" x2="60" y2="90"/><!-- torso -->
        <line x1="60" y1="90" x2="40" y2="140"/><!-- left leg -->
        <line x1="60" y1="90" x2="80" y2="140"/><!-- right leg -->
        <line x1="60" y1="52" x2="30" y2="75"/><!-- left arm -->
        <line x1="60" y1="52" x2="90" y2="75"/><!-- right arm -->
      </g>
      <!-- Clothing items that fade in one by one -->
      <g class="clothing pants">
        <line x1="60" y1="88" x2="42" y2="138" stroke-width="6"/>
        <line x1="60" y1="88" x2="78" y2="138" stroke-width="6"/>
      </g>
      <g class="clothing shirt">
        <rect x="48" y="38" width="24" height="48" rx="4" fill="none" stroke-width="2.5"/>
        <line x1="60" y1="52" x2="32" y2="73" stroke-width="5"/>
        <line x1="60" y1="52" x2="88" y2="73" stroke-width="5"/>
      </g>
      <g class="clothing shoes">
        <ellipse cx="40" cy="144" rx="10" ry="5"/>
        <ellipse cx="80" cy="144" rx="10" ry="5"/>
      </g>
      <g class="clothing jacket">
        <rect x="44" y="40" width="32" height="50" rx="6" fill="none" stroke-width="2"/>
      </g>
      <g class="clothing hat">
        <ellipse cx="60" cy="12" rx="18" ry="6"/>
        <rect x="50" y="4" width="20" height="10" rx="4" fill="none"/>
      </g>
    </svg>
    <div class="loading-text">Putting together your look...</div>
  </div>

  <!-- Results state -->
  <div class="shop-results" id="shop-results">
    <div class="shop-results-header">
      <div class="vibe-label">Outfit for</div>
      <div class="vibe-text" id="shop-vibe-text"></div>
    </div>
    <div class="product-grid" id="product-grid"></div>
    <div class="shop-reset-row">
      <button class="reset-btn" id="shop-reset">Start Over</button>
    </div>
  </div>
</div>

<script>
// ── Shared utilities ────────────────────────────────────
function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Saved pieces (localStorage) ─────────────────────────
function getSavedPieces() {
  try { return JSON.parse(localStorage.getItem('savedPieces') || '[]'); }
  catch { return []; }
}

function savePiece(item) {
  const saved = getSavedPieces();
  if (!saved.some(s => s.link === item.link)) {
    saved.push(item);
    localStorage.setItem('savedPieces', JSON.stringify(saved));
  }
}

function unsavePiece(link) {
  const saved = getSavedPieces().filter(s => s.link !== link);
  localStorage.setItem('savedPieces', JSON.stringify(saved));
}

function isPieceSaved(link) {
  return getSavedPieces().some(s => s.link === link);
}

// ═══════════════════════════════════════════════════════════
// SHOP
// ═══════════════════════════════════════════════════════════
const shopInputZone = document.getElementById('shop-input-zone');
const shopLoading = document.getElementById('shop-loading');
const shopResults = document.getElementById('shop-results');
const vibeInput = document.getElementById('vibe-input');
const productGrid = document.getElementById('product-grid');
let shopBusy = false;

document.querySelectorAll('.vibe-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    vibeInput.value = chip.dataset.v;
    sendVibe();
  });
});

document.getElementById('vibe-send').addEventListener('click', sendVibe);
vibeInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendVibe(); });

async function sendVibe() {
  const vibe = vibeInput.value.trim();
  if (!vibe || shopBusy) return;
  shopBusy = true;
  document.getElementById('vibe-send').disabled = true;

  shopInputZone.classList.add('hidden');
  shopLoading.classList.add('active');

  try {
    const res = await fetch('/shop-vibe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ vibe, profile: getUserProfile() }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || 'Request failed');
    }
    const data = await res.json();
    renderProducts(data.vibe, data.items);
  } catch (err) {
    shopLoading.classList.remove('active');
    shopInputZone.classList.remove('hidden');
    alert('Could not get recommendations: ' + err.message);
  }

  shopBusy = false;
  document.getElementById('vibe-send').disabled = false;
}

function buildCardHtml(item) {
  const saved = isPieceSaved(item.link);
  const imgHtml = item.image
    ? '<img class="product-image" src="' + escapeHtml(item.image) + '" alt="' + escapeHtml(item.name) + '" onerror="this.style.display=\'none\'">'
    : '';
  return imgHtml +
    '<div class="product-info">' +
    '<div class="product-name">' + escapeHtml(item.name) + '</div>' +
    '<div class="product-price">' + escapeHtml(item.price) + '</div>' +
    '</div>' +
    '<div class="card-actions">' +
    '<button class="skip-btn" title="Skip &mdash; find another">' +
    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/><line x1="4" y1="4" x2="20" y2="20"/></svg>' +
    '</button>' +
    '<button class="save-btn' + (saved ? ' saved' : '') + '" title="' + (saved ? 'Unsave' : 'Save this piece') + '">' +
    '<svg width="18" height="18" viewBox="0 0 24 24" ' + (saved ? 'fill="currentColor"' : 'fill="none"') + ' stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg>' +
    '</button>' +
    '</div>';
}

function wireCardActions(card) {
  card.querySelector('.skip-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    refreshCard(card);
  });
  card.querySelector('.save-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleSave(card);
  });
}

function renderProducts(vibe, items) {
  document.getElementById('shop-vibe-text').textContent = vibe;
  productGrid.innerHTML = '';

  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.style.animationDelay = (i * 0.08) + 's';

    card._searchInfo = {
      item: item.search_item || item.description,
      brand: item.brand,
      product: item.search_product || '',
    };
    card._currentItem = item;
    card._allLinks = [item.link];

    card.innerHTML = buildCardHtml(item);

    // Click card to open product link
    card.addEventListener('click', () => {
      window.open(card._currentItem.link, '_blank', 'noopener');
    });

    wireCardActions(card);
    productGrid.appendChild(card);
  });

  shopLoading.classList.remove('active');
  shopResults.classList.add('active');
}

function toggleSave(card) {
  const item = card._currentItem;
  const btn = card.querySelector('.save-btn');
  if (isPieceSaved(item.link)) {
    unsavePiece(item.link);
    btn.classList.remove('saved');
    btn.title = 'Save this piece';
    btn.querySelector('svg').setAttribute('fill', 'none');
  } else {
    savePiece(item);
    btn.classList.add('saved');
    btn.title = 'Unsave';
    btn.querySelector('svg').setAttribute('fill', 'currentColor');
  }
}

async function refreshCard(card) {
  const skipBtn = card.querySelector('.skip-btn');
  if (skipBtn.disabled) return;

  skipBtn.disabled = true;
  card.classList.add('refreshing');

  const profile = getUserProfile();
  const budget = (profile && profile.budget) || '';

  try {
    const res = await fetch('/shop-refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        item: card._searchInfo.item,
        brand: card._searchInfo.brand,
        product: card._searchInfo.product,
        budget: budget,
        exclude_links: card._allLinks,
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || 'No alternatives found');
    }
    const newItem = await res.json();

    card._currentItem = newItem;
    card._allLinks.push(newItem.link);

    card.innerHTML = buildCardHtml(newItem);
    wireCardActions(card);
  } catch (err) {
    // silently keep current card if no alternatives
  }

  card.classList.remove('refreshing');
}

document.getElementById('shop-reset').addEventListener('click', () => {
  shopResults.classList.remove('active');
  shopInputZone.classList.remove('hidden');
  vibeInput.value = '';
  productGrid.innerHTML = '';
});

// ═══════════════════════════════════════════════════════════
// USER PROFILE / ONBOARDING
// ═══════════════════════════════════════════════════════════
function getUserProfile() {
  try {
    const p = JSON.parse(localStorage.getItem('userProfile'));
    return (p && !p.skipped) ? p : null;
  } catch { return null; }
}

function saveUserProfile(data) {
  localStorage.setItem('userProfile', JSON.stringify(data));
}

const onboarding = document.getElementById('onboarding');

// Pill selection logic
document.querySelectorAll('.pill-group').forEach(group => {
  group.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      group.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
      pill.classList.add('selected');
    });
  });
});

// Save profile
document.getElementById('ob-save').addEventListener('click', () => {
  const height = document.getElementById('ob-height').value;
  const buildEl = document.querySelector('#ob-build .pill.selected');
  const budgetEl = document.querySelector('#ob-budget .pill.selected');
  const build = buildEl ? buildEl.dataset.val : '';
  const budget = budgetEl ? budgetEl.dataset.val : '';
  saveUserProfile({ height, build, budget });
  onboarding.classList.add('hidden');
});

// Skip
document.getElementById('ob-skip').addEventListener('click', () => {
  saveUserProfile({ skipped: true });
  onboarding.classList.add('hidden');
});

// Edit profile
document.getElementById('edit-profile').addEventListener('click', () => {
  const profile = getUserProfile();
  if (profile) {
    document.getElementById('ob-height').value = profile.height || '';
    document.querySelectorAll('#ob-build .pill').forEach(p => {
      p.classList.toggle('selected', p.dataset.val === profile.build);
    });
    document.querySelectorAll('#ob-budget .pill').forEach(p => {
      p.classList.toggle('selected', p.dataset.val === profile.budget);
    });
  }
  onboarding.classList.remove('hidden');
});

// Show onboarding on first visit
if (!localStorage.getItem('userProfile')) {
  onboarding.classList.remove('hidden');
} else {
  onboarding.classList.add('hidden');
}
</script>
</body>
