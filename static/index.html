<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Advisor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a1a;
  --bg-card: #242424;
  --bg-input: #2a2a2a;
  --bg-hover: #333;
  --text: #e8e4df;
  --text-muted: #999;
  --accent: #c4a265;
  --accent-dim: rgba(196, 162, 101, 0.15);
  --border: #333;
  --radius: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

html, body { height: 100%; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ── Header ─────────────────────────────────────────── */
header {
  padding: 20px 24px 0;
  text-align: center;
  flex-shrink: 0;
}

header h1 {
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--accent);
  margin-bottom: 4px;
}

header p {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 16px;
}

/* ── Main panel ────────────────────────────────────── */
.main-panel {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

/* ── Animations ────────────────────────────────────── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}


input, textarea {
  flex: 1;
  padding: 12px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.9rem;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.2s;
}

input:focus, textarea:focus { border-color: var(--accent); }
input::placeholder, textarea::placeholder { color: var(--text-muted); }

.dots { display: flex; gap: 5px; }
.dots span { width: 7px; height: 7px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite; }
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }

.reset-btn {
  padding: 10px 28px;
  border-radius: 24px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 0.88rem;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s;
}

.reset-btn:hover { color: var(--accent); border-color: var(--accent); }

/* ════════════════════════════════════════════════════════
   SHOP (Vibe-based discovery)
   ════════════════════════════════════════════════════════ */
.main-panel {
  align-items: center;
  padding: 24px;
}

/* State: input */
.shop-input-zone {
  width: 100%;
  max-width: 600px;
  margin: auto;
  text-align: center;
}

.shop-input-zone h2 {
  font-size: 1.4rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 8px;
}

.shop-input-zone .shop-subtitle {
  font-size: 0.88rem;
  color: var(--text-muted);
  margin-bottom: 28px;
  line-height: 1.5;
}

.vibe-input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

.vibe-input-row input {
  flex: 1;
  padding: 14px 20px;
  font-size: 1rem;
  border-radius: 28px;
  background: var(--bg-card);
  border: 1px solid var(--border);
}

.vibe-input-row input:focus { border-color: var(--accent); }

.vibe-input-row button {
  padding: 14px 28px;
  border-radius: 28px;
  background: var(--accent);
  color: #1a1a1a;
  border: none;
  font-size: 0.95rem;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: opacity 0.2s;
  white-space: nowrap;
}

.vibe-input-row button:hover { opacity: 0.85; }
.vibe-input-row button:disabled { opacity: 0.4; cursor: not-allowed; }

.vibe-examples {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.vibe-chip {
  padding: 7px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-muted);
  font-size: 0.82rem;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.2s;
}

.vibe-chip:hover { color: var(--accent); border-color: var(--accent); }

/* State: loading */
.shop-loading {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  margin: auto;
}

.shop-loading.active { display: flex; }
.shop-loading .loading-text { font-size: 0.95rem; color: var(--text-muted); }

/* State: results */
.shop-results {
  display: none;
  width: 100%;
  max-width: 860px;
  flex-direction: column;
  gap: 20px;
  padding-bottom: 24px;
}

.shop-results.active { display: flex; }

.shop-results-header {
  text-align: center;
  padding: 8px 0 4px;
}

.shop-results-header .vibe-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

.shop-results-header .vibe-text {
  font-size: 1.15rem;
  color: var(--accent);
  font-weight: 500;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

.product-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: all 0.2s;
  animation: fadeIn 0.4s ease;
}

.product-card:hover { border-color: var(--accent); transform: translateY(-2px); }

.product-card .product-image {
  width: 100%;
  height: 200px;
  object-fit: cover;
  background: var(--bg-input);
  display: block;
}

.product-card .product-info {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}

.product-card .product-brand {
  font-size: 0.72rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.product-card .product-name {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

.product-card .product-price {
  font-size: 0.88rem;
  color: var(--accent);
  font-weight: 600;
}

.product-card .product-desc {
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.5;
  flex: 1;
}

.product-card .product-link {
  display: inline-block;
  padding: 8px 18px;
  background: var(--accent-dim);
  border: 1px solid rgba(196, 162, 101, 0.3);
  border-radius: 20px;
  color: var(--accent);
  font-size: 0.82rem;
  text-decoration: none;
  text-align: center;
  transition: all 0.2s;
}

.product-card .product-link:hover { background: rgba(196, 162, 101, 0.25); border-color: var(--accent); }

.shop-reset-row {
  text-align: center;
  padding-top: 8px;
}

/* ── Hidden ─────────────────────────────────────────── */
.hidden { display: none !important; }

/* ── Mobile ─────────────────────────────────────────── */
@media (max-width: 600px) {
  header { padding: 16px 16px 0; }
  header h1 { font-size: 1.25rem; }
  .main-panel { padding: 16px; }
  .vibe-input-row { flex-direction: column; }
  .vibe-input-row button { width: 100%; }
  .product-grid { grid-template-columns: 1fr; }
}

/* ── Onboarding Overlay ────────────────────────────── */
.onboarding-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.3s;
}
.onboarding-overlay.hidden { display: none; }
.onboarding-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 32px;
  max-width: 420px;
  width: 90%;
  text-align: center;
}
.onboarding-card h2 {
  color: var(--accent);
  font-size: 1.3rem;
  margin-bottom: 6px;
}
.onboarding-card .subtitle {
  color: var(--text-muted);
  font-size: 0.85rem;
  margin-bottom: 24px;
}
.onboarding-field {
  margin-bottom: 20px;
  text-align: left;
}
.onboarding-field label {
  display: block;
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.onboarding-field select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg-input);
  color: var(--text);
  font-size: 0.95rem;
  font-family: var(--font);
  appearance: none;
  cursor: pointer;
}
.pill-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.pill-group .pill {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 0.85rem;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s;
}
.pill-group .pill:hover { background: var(--bg-hover); color: var(--text); }
.pill-group .pill.selected {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: var(--accent);
}
.onboarding-submit {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: var(--accent);
  color: #1a1a1a;
  font-size: 1rem;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.2s;
}
.onboarding-submit:hover { opacity: 0.9; }
.onboarding-skip {
  display: inline-block;
  margin-top: 14px;
  color: var(--text-muted);
  font-size: 0.8rem;
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font);
  text-decoration: underline;
}
.onboarding-skip:hover { color: var(--text); }

/* ── Edit Profile button ───────────────────────────── */
.edit-profile-btn {
  position: absolute;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-muted);
  font-size: 0.75rem;
  padding: 5px 10px;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.2s;
}
.edit-profile-btn:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<!-- Onboarding overlay -->
<div class="onboarding-overlay" id="onboarding">
  <div class="onboarding-card">
    <h2>Welcome</h2>
    <p class="subtitle">Tell us a bit about yourself so we can personalize your experience.</p>

    <div class="onboarding-field">
      <label>Height</label>
      <select id="ob-height">
        <option value="">Select...</option>
        <option value="5'4&quot; or under">5'4" or under</option>
        <option value="5'5&quot;&ndash;5'8&quot;">5'5"&ndash;5'8"</option>
        <option value="5'9&quot;&ndash;6'0&quot;">5'9"&ndash;6'0"</option>
        <option value="6'1&quot;+">6'1"+</option>
      </select>
    </div>

    <div class="onboarding-field">
      <label>Build</label>
      <div class="pill-group" id="ob-build">
        <button class="pill" data-val="slim">Slim</button>
        <button class="pill" data-val="average">Average</button>
        <button class="pill" data-val="athletic">Athletic</button>
        <button class="pill" data-val="stocky">Stocky</button>
      </div>
    </div>

    <div class="onboarding-field">
      <label>Budget per item</label>
      <div class="pill-group" id="ob-budget">
        <button class="pill" data-val="budget">Balling on a Budget</button>
        <button class="pill" data-val="moderate">I Like Nice Things</button>
        <button class="pill" data-val="luxury">Money Is No Object</button>
      </div>
    </div>

    <button class="onboarding-submit" id="ob-save">Get Started</button>
    <button class="onboarding-skip" id="ob-skip">Skip for now</button>
  </div>
</div>

<header style="position: relative;">
  <h1>FASHION ADVISOR</h1>
  <button class="edit-profile-btn" id="edit-profile">Edit Profile</button>
</header>

<div class="main-panel">
  <!-- Input state -->
  <div class="shop-input-zone" id="shop-input-zone">
    <h2>Describe the vibe</h2>
    <div class="shop-subtitle">Tell us the occasion or aesthetic and we'll curate the outfit.</div>
    <div class="vibe-input-row">
      <input type="text" id="vibe-input" placeholder="Ranch wedding in Texas...">
      <button id="vibe-send">Find Looks</button>
    </div>
    <div class="vibe-examples">
      <button class="vibe-chip" data-v="Smart casual Friday in NYC">Smart casual Friday</button>
      <button class="vibe-chip" data-v="Beach wedding in Positano">Beach wedding</button>
      <button class="vibe-chip" data-v="First date at a cocktail bar">Cocktail bar date</button>
      <button class="vibe-chip" data-v="Old money country club weekend">Country club weekend</button>
    </div>
  </div>

  <!-- Loading state -->
  <div class="shop-loading" id="shop-loading">
    <div class="loading-text">Curating your look...</div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>

  <!-- Results state -->
  <div class="shop-results" id="shop-results">
    <div class="shop-results-header">
      <div class="vibe-label">Outfit for</div>
      <div class="vibe-text" id="shop-vibe-text"></div>
    </div>
    <div class="product-grid" id="product-grid"></div>
    <div class="shop-reset-row">
      <button class="reset-btn" id="shop-reset">Start Over</button>
    </div>
  </div>
</div>

<script>
// ── Shared utilities ────────────────────────────────────
function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ═══════════════════════════════════════════════════════════
// SHOP
// ═══════════════════════════════════════════════════════════
const shopInputZone = document.getElementById('shop-input-zone');
const shopLoading = document.getElementById('shop-loading');
const shopResults = document.getElementById('shop-results');
const vibeInput = document.getElementById('vibe-input');
const productGrid = document.getElementById('product-grid');
let shopBusy = false;

document.querySelectorAll('.vibe-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    vibeInput.value = chip.dataset.v;
    sendVibe();
  });
});

document.getElementById('vibe-send').addEventListener('click', sendVibe);
vibeInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendVibe(); });

async function sendVibe() {
  const vibe = vibeInput.value.trim();
  if (!vibe || shopBusy) return;
  shopBusy = true;
  document.getElementById('vibe-send').disabled = true;

  shopInputZone.classList.add('hidden');
  shopLoading.classList.add('active');

  try {
    const res = await fetch('/shop-vibe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ vibe, profile: getUserProfile() }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || 'Request failed');
    }
    const data = await res.json();
    renderProducts(data.vibe, data.items);
  } catch (err) {
    // Show error and go back to input
    shopLoading.classList.remove('active');
    shopInputZone.classList.remove('hidden');
    alert('Could not get recommendations: ' + err.message);
  }

  shopBusy = false;
  document.getElementById('vibe-send').disabled = false;
}

function renderProducts(vibe, items) {
  document.getElementById('shop-vibe-text').textContent = vibe;
  productGrid.innerHTML = '';

  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.style.animationDelay = (i * 0.08) + 's';
    const imgHtml = item.image
      ? '<img class="product-image" src="' + escapeHtml(item.image) + '" alt="' + escapeHtml(item.name) + '" onerror="this.style.display=\'none\'">'
      : '';
    card.innerHTML = imgHtml +
      '<div class="product-info">' +
      '<div class="product-brand">' + escapeHtml(item.brand) + '</div>' +
      '<div class="product-name">' + escapeHtml(item.name) + '</div>' +
      '<div class="product-price">' + escapeHtml(item.price) + '</div>' +
      '<div class="product-desc">' + escapeHtml(item.description) + '</div>' +
      '<a class="product-link" href="' + escapeHtml(item.link) + '" target="_blank" rel="noopener">Shop Now</a>' +
      '</div>';
    productGrid.appendChild(card);
  });

  shopLoading.classList.remove('active');
  shopResults.classList.add('active');
}

document.getElementById('shop-reset').addEventListener('click', () => {
  shopResults.classList.remove('active');
  shopInputZone.classList.remove('hidden');
  vibeInput.value = '';
  productGrid.innerHTML = '';
});

// ═══════════════════════════════════════════════════════════
// USER PROFILE / ONBOARDING
// ═══════════════════════════════════════════════════════════
function getUserProfile() {
  try {
    const p = JSON.parse(localStorage.getItem('userProfile'));
    return (p && !p.skipped) ? p : null;
  } catch { return null; }
}

function saveUserProfile(data) {
  localStorage.setItem('userProfile', JSON.stringify(data));
}

const onboarding = document.getElementById('onboarding');

// Pill selection logic
document.querySelectorAll('.pill-group').forEach(group => {
  group.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      group.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
      pill.classList.add('selected');
    });
  });
});

// Save profile
document.getElementById('ob-save').addEventListener('click', () => {
  const height = document.getElementById('ob-height').value;
  const buildEl = document.querySelector('#ob-build .pill.selected');
  const budgetEl = document.querySelector('#ob-budget .pill.selected');
  const build = buildEl ? buildEl.dataset.val : '';
  const budget = budgetEl ? budgetEl.dataset.val : '';
  saveUserProfile({ height, build, budget });
  onboarding.classList.add('hidden');
});

// Skip
document.getElementById('ob-skip').addEventListener('click', () => {
  saveUserProfile({ skipped: true });
  onboarding.classList.add('hidden');
});

// Edit profile
document.getElementById('edit-profile').addEventListener('click', () => {
  const profile = getUserProfile();
  if (profile) {
    // Pre-fill values
    document.getElementById('ob-height').value = profile.height || '';
    document.querySelectorAll('#ob-build .pill').forEach(p => {
      p.classList.toggle('selected', p.dataset.val === profile.build);
    });
    document.querySelectorAll('#ob-budget .pill').forEach(p => {
      p.classList.toggle('selected', p.dataset.val === profile.budget);
    });
  }
  onboarding.classList.remove('hidden');
});

// Show onboarding on first visit
if (!localStorage.getItem('userProfile')) {
  onboarding.classList.remove('hidden');
} else {
  onboarding.classList.add('hidden');
}
</script>
</body>
</html>
